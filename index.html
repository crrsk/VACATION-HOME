      "numberOfRooms": 3,
      "occupancy": {

      "amenityFeature": [
        {
          "@type": "LocationFeatureSpecification",
          "name": "Piscina privada",
          "value": true
        },
        {
          "@type": "LocationFeatureSpecification",
